{% extends "base.html" %}
{% block title %}Online Clipboard | Tech Tools{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto p-4 sm:p-6">

  <div class="bg-white shadow-xl rounded-2xl sm:rounded-3xl p-4 sm:p-8 border border-gray-100">

    <!-- 🔹 Header -->
    <div class="flex items-center justify-center gap-2 sm:gap-3 mb-3 sm:mb-4">
      <div class="bg-indigo-100 p-2 sm:p-3 rounded-xl">
        <i data-lucide="clipboard" class="w-5 h-5 sm:w-6 sm:h-6 text-indigo-600"></i>
      </div>
      <h1 class="text-lg sm:text-2xl font-bold text-gray-800">Online Clipboard</h1>
    </div>

    <p class="text-center text-gray-500 mb-4 sm:mb-6 text-xs sm:text-sm">
      Copy, save, and share text instantly across devices
    </p>

    <!-- 🔹 TOP SECTION -->
    <div id="linkBox" class="mb-6 sm:mb-8 hidden">

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6 items-center">

        <!-- 🔹 LINK -->
        <div class="sm:col-span-2">
          <div class="flex items-center gap-2 mb-1 sm:mb-2 text-green-600 font-semibold text-xs sm:text-sm">
            <i data-lucide="check-circle" class="w-4 h-4 sm:w-5 sm:h-5"></i>
            Link Generated
          </div>

          <div class="flex gap-2">
            <input id="clipLink" readonly
              class="flex-1 p-2 sm:p-3 border border-gray-200 rounded-lg sm:rounded-xl text-xs sm:text-sm"/>

            <button onclick="copyLink(this)"
              class="bg-indigo-600 text-white px-3 sm:px-4 py-2 rounded-lg sm:rounded-xl hover:bg-indigo-700 transition text-xs sm:text-sm">
              <i data-lucide="copy" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- 🔹 QR -->
        <div class="text-center">
          <div class="flex items-center justify-center gap-1 sm:gap-2 text-gray-600 mb-1 sm:mb-2">
            <i data-lucide="qr-code" class="w-4 h-4 sm:w-5 sm:h-5"></i> Scan QR Code
          </div>

          <img id="qrImage"
            class="mx-auto w-24 sm:w-32 hidden border rounded-lg sm:rounded-xl shadow-sm p-1 sm:p-2 bg-white"/>
        </div>

      </div>

    </div>

    <!-- 🔹 TEXT AREA -->
    <div class="relative">
      <textarea id="clipText"
        class="w-full p-3 sm:p-4 border border-gray-200 rounded-lg sm:rounded-xl h-40 sm:h-52 focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none text-sm"
        placeholder="Paste or type text here...">{{ data }}</textarea>

      <i data-lucide="edit-3"
         class="absolute top-2 right-2 sm:top-3 sm:right-3 w-4 h-4 text-gray-400"></i>
    </div>

    <!-- 🔹 BUTTONS -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 mt-4 sm:mt-6">

      <button onclick="saveClip()"
        class="flex items-center justify-center gap-1 sm:gap-2 bg-indigo-600 text-white py-2 rounded-lg sm:rounded-xl hover:bg-indigo-700 transition text-xs sm:text-sm">
        <i data-lucide="save" class="w-4 h-4"></i>
        <span class=" ">Save</span>
      </button>

      <button onclick="copyText(this)"
        class="flex items-center justify-center gap-1 sm:gap-2 bg-green-600 text-white py-2 rounded-lg sm:rounded-xl hover:bg-green-700 transition text-xs sm:text-sm">
        <i data-lucide="copy" class="w-4 h-4"></i>
        <span class="">Copy</span>
      </button>

      <button onclick="clearText()"
        class="flex items-center justify-center gap-1 sm:gap-2 bg-red-500 text-white py-2 rounded-lg sm:rounded-xl hover:bg-red-600 transition text-xs sm:text-sm">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
        <span class=" ">Clear</span>
      </button>

      <button onclick="refreshData()"
        class="flex items-center justify-center gap-1 sm:gap-2 bg-blue-500 text-white py-2 rounded-lg sm:rounded-xl hover:bg-blue-600 transition text-xs sm:text-sm">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        <span class=" ">Refresh</span>
      </button>

    </div>

  </div>
</div>

<script>

async function saveClip() {
    let text = document.getElementById("clipText").value;
    let currentId = new URLSearchParams(window.location.search).get("id");

    let res = await fetch("/clipboard", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text, id: currentId })
    });

    let data = await res.json();
    let fullUrl = window.location.origin + data.url;

    showResult(fullUrl);

    if (!currentId) {
        window.history.pushState({}, "", data.url);
    }
}

// 🔥 COMMON FUNCTION (reuse)
function showResult(url) {
    document.getElementById("clipLink").value = url;
    document.getElementById("linkBox").classList.remove("hidden");

    const qr = document.getElementById("qrImage");
    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + url;
    qr.classList.remove("hidden");
}

// 🔥 AUTO LOAD (PRE-GENERATE)
window.addEventListener("DOMContentLoaded", () => {
    const clipId = new URLSearchParams(window.location.search).get("id");

    if (clipId) {
        showResult(window.location.href);
    }
});

function copyText(btn) {
    const text = document.getElementById("clipText").value;

    navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = "Copied!";
        setTimeout(() => {
            btn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i> Copy';
            lucide.createIcons();
        }, 1500);
    });
}

function copyLink(btn) {
    const link = document.getElementById("clipLink").value;

    navigator.clipboard.writeText(link).then(() => {
        btn.innerHTML = "Copied!";
        setTimeout(() => {
            btn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i>';
            lucide.createIcons();
        }, 1500);
    });
}

function clearText() {
    document.getElementById("clipText").value = "";
}

function refreshData() {
    location.reload();
}

</script>

{% endblock %}
