{% extends "base.html" %}

{% block title %}Download File | Tech Tools{% endblock %}

{% block content %}

<section class="min-h-[70vh] flex items-center justify-center px-4 py-10">

  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white border shadow-xl rounded-3xl p-8 text-center">

      <!-- Icon -->
      <div class="flex justify-center mb-4">
        <div class="bg-blue-100 p-4 rounded-full">
          <i data-lucide="download-cloud" class="w-8 h-8 text-blue-600"></i>
        </div>
      </div>

      <!-- Title -->
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">
        Download File
      </h1>

      <p class="text-gray-500 text-sm mt-2 mb-6">
        Your file is ready. Click below to download securely.
      </p>

      <!-- Download Button -->
      <a href="{{ url_for('file_share.download_file', short_id=file_id) }}"
         class="flex items-center justify-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition shadow-md">

        <i data-lucide="download" class="w-5 h-5"></i>
        Download Now

      </a>

      <!-- Extra Info -->
      <div class="mt-6 text-xs text-gray-400">
        Secure download link generated by Tech Tools
      </div>

    </div>

    <!-- Back -->
    <div class="text-center mt-6">
      <a href="/share" class="text-gray-500 hover:text-blue-600 text-sm flex items-center justify-center gap-1">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Back to File Share
      </a>
    </div>

  </div>

</section>

{% endblock %}
