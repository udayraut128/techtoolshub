{% extends "base.html" %}
{% block title %}Date Converter (BS ↔ AD) | Tech Tools{% endblock %}

{% block content %}

<div class="max-w-2xl mx-auto p-4 sm:p-6">

  <div class="bg-white shadow-xl rounded-3xl p-6 sm:p-8 border">

    <!-- Header -->
    <div class="flex items-center justify-center gap-2 mb-4">
      <i data-lucide="calendar" class="w-6 h-6 text-indigo-600"></i>
      <h1 class="text-xl sm:text-2xl font-bold">Date Converter</h1>
    </div>

    <p class="text-center text-gray-500 text-sm mb-6">
      Convert Bikram Sambat (BS) ↔ Gregorian (AD)
    </p>

    <!-- FORM -->
    <form method="POST" class="space-y-4">

      <!-- Type -->
      <select name="type"
        class="w-full p-3 border rounded-xl">
        <option value="bs_to_ad">BS → AD</option>
        <option value="ad_to_bs">AD → BS</option>
      </select>

      <!-- Date Inputs -->
      <div class="grid grid-cols-3 gap-2">

        <input type="number" name="year" placeholder="Year"
          class="p-3 border rounded-xl" required>

        <input type="number" name="month" placeholder="Month"
          class="p-3 border rounded-xl" required>

        <input type="number" name="day" placeholder="Day"
          class="p-3 border rounded-xl" required>

      </div>

      <!-- Submit -->
      <button
        class="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition flex items-center justify-center gap-2">
        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        Convert
      </button>

    </form>

    <!-- Result -->
    {% if result %}
    <div class="mt-6 text-center bg-green-50 border border-green-200 p-4 rounded-xl">
      <p class="text-green-700 font-semibold">{{ result }}</p>
    </div>
    {% endif %}

  </div>

</div>

{% endblock %}
