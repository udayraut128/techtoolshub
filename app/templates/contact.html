{% extends "base.html" %}

{% block title %}Contact Us | TechTools{% endblock %}

{% block content %}

<div class="min-h-screen bg-gray-50 py-10 px-4">

  <div class="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow border">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <i data-lucide="mail" class="w-6 h-6 text-indigo-600"></i>
      <h1 class="text-2xl font-bold text-gray-800">Contact Us</h1>
    </div>

    <p class="text-gray-600 mb-6">
      Have questions, feedback, or suggestions? Feel free to reach out.
    </p>

    <!-- Flash Message -->
    {% if message %}
      <div class="mb-4 p-3 rounded-lg bg-green-100 text-green-700 text-sm">
        {{ message }}
      </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="/contact" class="space-y-4">

      <!-- Name -->
      <div>
        <label class="block text-sm text-gray-700 mb-1 flex items-center gap-1">
          <i data-lucide="user" class="w-4 h-4"></i> Name
        </label>
        <input type="text" name="name" required
          class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-700 mb-1 flex items-center gap-1">
          <i data-lucide="at-sign" class="w-4 h-4"></i> Email
        </label>
        <input type="email" name="email" required
          class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Message -->
      <div>
        <label class="block text-sm text-gray-700 mb-1 flex items-center gap-1">
          <i data-lucide="message-square" class="w-4 h-4"></i> Message
        </label>
        <textarea name="message" rows="4" required
          class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
      </div>

      <!-- Button -->
      <button type="submit"
        class="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition flex items-center justify-center gap-2">

        <i data-lucide="send" class="w-4 h-4"></i>
        Send Message

      </button>

    </form>

  </div>

</div>

<script>
lucide.createIcons();
</script>

{% endblock %}
