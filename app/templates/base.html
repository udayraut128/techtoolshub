<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ================= SEO ================= -->
<title>{% block title %}TechTools | Free Online Tools{% endblock %}</title>

<meta name="description" content="{% block description %}Free online tools like QR generator, file sharing, and group creator.{% endblock %}">
<meta name="keywords" content="{% block keywords %}online tools, QR code generator, file sharing, group generator{% endblock %}">
<meta name="author" content="HackerBytez">

<link rel="canonical" href="{% block canonical %}https://techtools.hackerbytez.com{% endblock %}">

<!-- ================= OPEN GRAPH (SOCIAL) ================= -->
<meta property="og:title" content="{{ og_title | default('TechTools | Free Online Tools') }}">
<meta property="og:description" content="{{ og_desc | default('Free online tools for productivity') }}">
<meta property="og:url" content="{{ og_url | default('https://techtools.hackerbytez.com') }}">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ og_image | default(url_for('static', filename='logo.png')) }}">

<!-- ================= TWITTER ================= -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ og_title | default('TechTools | Free Online Tools') }}">
<meta name="twitter:description" content="{{ og_desc | default('Free online tools for productivity') }}">
<meta name="twitter:image" content="{{ og_image | default(url_for('static', filename='logo.png')) }}">

<!-- ================= FAVICON ================= -->
<link rel="icon" href="{{ url_for('static', filename='logo.png') }}">

<!-- ================= FONTS ================= -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ================= CSS LIBRARIES ================= -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<!-- ================= STRUCTURED DATA (SEO BOOST) ================= -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "TechTools",
  "url": "https://techtools.hackerbytez.com",
  "description": "Free online tools like QR generator, file sharing and group creator"
}
</script>

<!-- ================= STYLE ================= -->
<style>
body {
  font-family: 'Inter', sans-serif;
}
</style>

{% block extra_head %}{% endblock %}

</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

<!-- ================= HEADER ================= -->
{% include "partials/header.html" %}

<!-- ================= MAIN CONTENT ================= -->
<main class="flex-grow">
  {% block content %}{% endblock %}
</main>

<!-- ================= FOOTER ================= -->
{% include "partials/footer.html" %}

<!-- ================= SCRIPTS ================= -->
<script>
  lucide.createIcons();
</script>

{% block extra_scripts %}{% endblock %}

</body>
</html>
