<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>File Sharing Tool</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">

<!-- Card -->
<div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-xl text-center">

<h1 class="text-3xl font-bold mb-4 text-purple-600">
📁 File Sharing Tool
</h1>

<p class="text-gray-600 mb-6">
Upload a file or a folder and get a short download link instantly
</p>

<!-- Upload Form -->
<form id="uploadForm" class="space-y-4">

<p class="font-semibold text-left">Upload Files</p>
<input 
type="file" 
name="file" 
id="fileInput"
multiple
class="w-full p-3 border rounded-lg"
/>

<p class="font-semibold text-left mt-4">Upload Folder</p>
<input 
type="file" 
name="file" 
id="folderInput"
multiple 
webkitdirectory
class="w-full p-3 border rounded-lg"
/>

<button 
type="submit"
class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 transition"
>
Upload & Generate Link
</button>
<button 
type="button"
onclick="clearSelection()"
class="w-full bg-gray-500 text-white py-2 rounded-lg hover:bg-gray-600 transition">
Clear Selection
</button>
</form>

<!-- Loading -->
<p id="loading" class="text-blue-500 mt-4 hidden">
Uploading...
</p>

<!-- Result -->
<div id="resultBox" class="mt-6 hidden text-center">

<p class="text-green-600 font-semibold mb-2">
✅ File Uploaded Successfully!
</p>

<input 
id="downloadLink"
type="text" 
readonly
class="w-full p-3 border rounded-lg text-center"
/>

<div class="flex gap-3 justify-center mt-3">

<button 
onclick="copyLink()"
class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
Copy Link
</button>

<a id="openLink" target="_blank"
class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
Open
</a>

</div>

<!-- QR Code -->
<div class="mt-6">
<img id="qrImage" class="mx-auto w-40 h-40 border rounded-lg hidden"/>
<p class="text-gray-500 mt-2 text-sm">Scan QR to download</p>
</div>

</div>

<!-- Error -->
<p id="error" class="text-red-500 mt-4 hidden"></p>

</div>

<!-- Back Button -->
<a href="/" class="mt-6 text-gray-600 hover:text-purple-600">
⬅ Back to Home
</a>

<script>

const form = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const folderInput = document.getElementById("folderInput");

const loading = document.getElementById("loading");
const resultBox = document.getElementById("resultBox");
const downloadLink = document.getElementById("downloadLink");
const qrImage = document.getElementById("qrImage");
const openLink = document.getElementById("openLink");
const error = document.getElementById("error");

// ✅ Allow only one at a time (disable other)
fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        folderInput.disabled = true;
    } else {
        folderInput.disabled = false;
    }
});

folderInput.addEventListener("change", () => {
    if (folderInput.files.length > 0) {
        fileInput.disabled = true;
    } else {
        fileInput.disabled = false;
    }
});
function clearSelection() {
    // Clear file inputs
    fileInput.value = "";
    folderInput.value = "";

    // Enable both inputs
    fileInput.disabled = false;
    folderInput.disabled = false;

    // Hide result section
    resultBox.classList.add("hidden");

    // Clear link + QR
    downloadLink.value = "";
    openLink.href = "#";

    qrImage.src = "";
    qrImage.classList.add("hidden");

    // Hide error if any
    error.classList.add("hidden");
    error.innerText = "";
}

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    loading.classList.remove("hidden");
    resultBox.classList.add("hidden");
    error.classList.add("hidden");

    let formData = new FormData(form);

    try {
        let res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        loading.classList.add("hidden");

        if (data.url) {
            resultBox.classList.remove("hidden");

            downloadLink.value = data.url;
            openLink.href = data.url;

            qrImage.src = data.qr;
            qrImage.classList.remove("hidden");

        } else {
            error.classList.remove("hidden");
            error.innerText = data.error;
        }

    } catch (err) {
        loading.classList.add("hidden");
        error.classList.remove("hidden");
        error.innerText = "Something went wrong!";
    }
});

function copyLink() {
    navigator.clipboard.writeText(downloadLink.value);
    alert("Link copied!");
}

</script>

</body>
</html>
