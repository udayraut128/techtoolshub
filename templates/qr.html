<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

<div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md text-center">

<h2 class="text-3xl font-bold text-blue-400 mb-6">📷 QR Code Generator</h2>

<form method="POST" class="space-y-4">

<input 
type="text" 
name="url" 
placeholder="Enter URL"
required
class="w-full p-3 rounded-lg text-black"
/>

<button 
type="submit"
class="w-full bg-blue-500 hover:bg-blue-600 p-3 rounded-lg font-semibold transition">
Generate QR Code
</button>

</form>


{% if qr_image %}

<div class="mt-6">

<h3 class="text-lg mb-3">Your QR Code</h3>

<img src="{{ qr_image }}" class="mx-auto rounded-lg shadow-lg w-48">

<a 
href="{{ qr_image }}" 
download="qrcode.png"
class="inline-block mt-4 bg-green-500 hover:bg-green-600 px-5 py-2 rounded-lg font-semibold transition">

⬇ Download QR Code

</a>

</div>

{% endif %}


<a href="/" class="block mt-6 text-gray-400 hover:text-white">
⬅ Back to Home
</a>

</div>

</body>
</html>
