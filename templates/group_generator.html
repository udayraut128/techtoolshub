<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Group Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-100 to-indigo-200 min-h-screen flex flex-col gap-4 items-center justify-center">

    <div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-lg">

        <h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">
           Student Group Creator
        </h2>

        <p class="text-gray-500 text-center mb-8">
            Upload your CSV or Excel file and generate balanced groups instantly.
        </p>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">

            <!-- File Upload -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Select CSV / Excel File
                </label>
                <input 
                    type="file" 
                    name="file" 
                    required
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                >
            </div>

            <!-- Group Number -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">
                    Number of Groups
                </label>
                <input 
                    type="number" 
                    name="groups" 
                    required
                    min="1"
                    placeholder="Enter number of groups"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                >
            </div>

            <!-- Submit Button -->
            <button 
                type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition duration-300 shadow-md"
            >
                Create Balanced Groups
            </button>

        </form>

    </div>
<!-- File Format Hint -->
<div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded-lg mb-6 text-sm text-left">

<p class="font-semibold text-yellow-700 mb-2">
⚠️ Important: File Format Required
</p>

<p class="text-gray-700">
Your file must contain the following columns:
</p>

<ul class="list-disc list-inside mt-2 text-gray-800">
<li><b>Name</b></li>
<li><b>Class</b></li>
<li><b>Roll No</b></li>
<li><b>Grade in pre</b></li>
<li><b>Gender</b></li>
</ul>

<p class="mt-2 text-gray-600">
Column names must match exactly (case-sensitive).
</p>

</div>
</body>
</html>
