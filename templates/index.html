<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevTools Hub</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white min-h-screen">

<!-- Header -->
<header class="text-center py-12">
<h1 class="text-5xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
⚡ DevTools Hub
</h1>

<p class="text-gray-400 mt-3 text-lg">
Fast & Simple Developer Utilities
</p>

</header>


<!-- Search Bar -->
<div class="max-w-2xl mx-auto px-6 mb-12">

<input 
id="searchInput"
type="text"
placeholder="🔍 Search tools..."
class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 focus:outline-none text-white"
/>

</div>



<!-- Tools Section -->
<div id="toolsContainer" class="max-w-6xl mx-auto grid md:grid-cols-3 gap-8 px-6">

<!-- QR Tool -->
<a href="/qr"
class="tool-card bg-gray-800/70 backdrop-blur-md p-6 rounded-xl shadow-lg border border-gray-700 hover:border-blue-500 transition transform hover:-translate-y-2">

<h2 class="text-2xl font-semibold mb-2">📷 QR Code Generator</h2>
<p class="text-gray-400">Generate QR codes from any URL instantly.</p>

</a>

</div>


<!-- Footer -->
<footer class="text-center mt-20 pb-10 text-gray-500 text-sm">
<p>Made with ❤️ using Python & Flask</p>
</footer>



<!-- Search Script -->
<script>

const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".tool-card");

searchInput.addEventListener("keyup", function() {

let filter = searchInput.value.toLowerCase();

cards.forEach(card => {

let text = card.innerText.toLowerCase();

if(text.includes(filter)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

});

</script>

</body>
</html>
